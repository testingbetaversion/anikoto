name: Build Executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --icon icon.ico anikoto/anikoto.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: anikoto-windows
          path: dist/anikoto.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Linux binary with PyInstaller
        run: |
          pyinstaller --onefile anikoto/anikoto.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: anikoto-linux
          path: dist/anikoto

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build macOS binary with PyInstaller
        run: |
          pyinstaller --onefile anikoto/anikoto.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: anikoto-macos
          path: dist/anikoto

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release assets (rename + zip)
        run: |
          set -eux

          # Windows: rename and zip
          if [ -f dist/anikoto-windows/anikoto.exe ]; then
            mv dist/anikoto-windows/anikoto.exe dist/anikoto-windows/anikoto-windows.exe
            zip -j dist/anikoto-windows/anikoto-windows.zip dist/anikoto-windows/anikoto-windows.exe
          else
            echo "Warning: dist/anikoto-windows/anikoto.exe not found"
          fi

          # Linux: rename, ensure exec bit, and zip
          if [ -f dist/anikoto-linux/anikoto ]; then
            mv dist/anikoto-linux/anikoto dist/anikoto-linux/anikoto-linux
            chmod +x dist/anikoto-linux/anikoto-linux
            zip -j dist/anikoto-linux/anikoto-linux.zip dist/anikoto-linux/anikoto-linux
          else
            echo "Warning: dist/anikoto-linux/anikoto not found"
          fi

          # macOS: rename, ensure exec bit, and zip
          if [ -f dist/anikoto-macos/anikoto ]; then
            mv dist/anikoto-macos/anikoto dist/anikoto-macos/anikoto-macos
            chmod +x dist/anikoto-macos/anikoto-macos
            zip -j dist/anikoto-macos/anikoto-macos.zip dist/anikoto-macos/anikoto-macos
          else
            echo "Warning: dist/anikoto-macos/anikoto not found"
          fi

          # Show what we will upload
          ls -lR dist

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Anikoto v1.0.${{ github.run_number }}"
          body: |
            Automated release build.
          files: |
            dist/anikoto-windows/anikoto-windows.zip
            dist/anikoto-linux/anikoto-linux.zip
            dist/anikoto-macos/anikoto-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
