name: Build Executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --icon icon.ico anikoto/anikoto.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: anikoto-windows
          path: dist/anikoto.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Linux binary with PyInstaller
        run: |
          pyinstaller --onefile anikoto/anikoto.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: anikoto-linux
          path: dist/anikoto

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build macOS binary with PyInstaller
        run: |
          pyinstaller --onefile anikoto/anikoto.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: anikoto-macos
          path: dist/anikoto
